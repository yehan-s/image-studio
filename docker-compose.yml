services:
  image-gen-system:
    build: .
    container_name: "${CONTAINER_NAME:-canvas-realm-studio}"
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      SUB2API_BASE_URL: "https://api.yehanapi.com/v1"
      SUB2API_API_KEY: "${SUB2API_API_KEY:-}"
      OPENAI_OAUTH_TOKEN_ENCRYPTION_KEY: "${OPENAI_OAUTH_TOKEN_ENCRYPTION_KEY}"
      ADMIN_SUB2API_KEY_HASH: "${ADMIN_SUB2API_KEY_HASH:-}"
      PROMPT_OPTIMIZER_FALLBACK_GLOBAL: "${PROMPT_OPTIMIZER_FALLBACK_GLOBAL:-false}"
      # SSO（阶段二）：留空 SUB2API_SSO_SHARED_SECRET 即关闭。base/app url 不配则从 SUB2API_BASE_URL 派生
      SUB2API_SSO_SHARED_SECRET: "${SUB2API_SSO_SHARED_SECRET:-}"
      SUB2API_SSO_BASE_URL: "${SUB2API_SSO_BASE_URL:-}"
      SUB2API_APP_URL: "${SUB2API_APP_URL:-}"
      IMAGE_MODEL: "gpt-image-2"
      IMAGE_STORAGE_DIR: "/app/data/images"
      DATABASE_URL: "file:/app/data/app.db"
      IMAGE_REQUEST_TIMEOUT_MS: "300000"
      WORKER_POLL_INTERVAL_MS: "3000"
      COST_PER_IMAGE: "${COST_PER_IMAGE:-0.04}"
      APP_BASE_URL: "${APP_BASE_URL:-}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-false}"
      UPDATE_REPO: "laolin5564/canvas-realm-gpt-image-2-studio"
      UPDATE_CHECK_URL: "https://api.github.com/repos/laolin5564/canvas-realm-gpt-image-2-studio/releases/latest"
      # Web 一键更新默认关闭。确认已按 README 挂载 docker socket，并把 Git 项目按宿主机相同绝对路径挂载后再改为 true。
      WEB_UPDATE_ENABLED: "${WEB_UPDATE_ENABLED:-false}"
      WEB_UPDATE_REPO_DIR: "${WEB_UPDATE_REPO_DIR:-/app}"
      WEB_UPDATE_LOCK_FILE: "${WEB_UPDATE_LOCK_FILE:-/tmp/canvas-realm-studio-web-update.lock}"
    volumes:
      - ./data:/app/data
      # 启用 Web 一键更新时需要取消下面两行注释，并用绝对路径启动：
      #   WEB_UPDATE_ENABLED=true WEB_UPDATE_REPO_DIR="$PWD" docker compose up -d --build
      # 关键：Git 项目目录在容器内路径必须等于宿主机绝对路径，否则 Docker daemon 无法读取 build context/volume。
      # - ${WEB_UPDATE_REPO_DIR}:${WEB_UPDATE_REPO_DIR}
      # - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
